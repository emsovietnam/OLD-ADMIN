image: docker:27-cli

stages: [build_images]

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_REGISTRY: harbor.emso.vn
  REGISTRY_PROJECT: emso-common
  REGISTRY_IMAGE: old-admin
  DOCKER_IMAGE: $DOCKER_REGISTRY/$REGISTRY_PROJECT/$REGISTRY_IMAGE
  REGISTRY_TAG: '0.0.1'

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"

emso-build-image:
  stage: build_images
  tags: [emso-runner]
  script:
    - echo "Login to Docker Registry"
    - echo "$HARBOR_ROBOT_TOKEN" | docker login -u "$HARBOR_ROBOT_USER" -p "$HARBOR_ROBOT_TOKEN" "$DOCKER_REGISTRY"
    - docker builder prune -af || true
    - docker build --pull --no-cache --build-arg CACHE_BUST=$CI_PIPELINE_ID --build-arg CI_COMMIT_SHA=$CI_COMMIT_SHA -t "$DOCKER_IMAGE:$REGISTRY_TAG" -t "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$DOCKER_IMAGE:$REGISTRY_TAG"
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - echo "Build xong! Commit SHA $CI_COMMIT_SHORT_SHA"
  after_script:
    - docker image prune -af
    - docker builder prune -af
    - docker logout "$DOCKER_REGISTRY"
